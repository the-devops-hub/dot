name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run release checks
        run: ./scripts/release-check.sh "${{ github.ref_name }}"

  release:
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            targets: "x86_64-unknown-linux-musl aarch64-unknown-linux-musl"
          - os: macos-latest
            targets: "aarch64-apple-darwin x86_64-apple-darwin"

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-zigbuild (Linux)
        if: runner.os == 'Linux'
        run: |
          pip install ziglang --quiet
          cargo install cargo-zigbuild --locked

      - name: Build and package all targets
        shell: bash
        run: |
          for target in ${{ matrix.targets }}; do
            rustup target add "$target"
            if [ "${{ runner.os }}" = "Linux" ]; then
              cargo zigbuild --release --target "$target"
            else
              cargo build --release --target "$target"
            fi

            case "$target" in
              x86_64-unknown-linux-musl)  os="linux";  arch="amd64" ;;
              aarch64-unknown-linux-musl) os="linux";  arch="arm64" ;;
              x86_64-apple-darwin)        os="darwin"; arch="amd64" ;;
              aarch64-apple-darwin)       os="darwin"; arch="arm64" ;;
            esac

            mkdir -p dist
            cp "target/$target/release/dot" dist/
            cp LICENSE README.md dist/
            tar -czf "dot-${os}-${arch}.tar.gz" -C dist .
            rm -rf dist
          done

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dot-*.tar.gz
          generate_release_notes: true
